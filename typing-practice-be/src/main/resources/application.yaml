spring:
  profiles:
    active: prod
  application:
    name: typing-practice-be

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


dotenv:
  path: .env.${spring.profiles.active}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

google:
  token-uri: https://oauth2.googleapis.com/token

quote:
  difficulty:
    cold-start-k: 20
  similarity-threshold:
    korean: 0.5
    english: 0.5
services:
  postgres:
    image: postgres:16
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: typing

  redis:
    image: redis:8
    restart: always
    ports:
      - '6379:6379'
  #    command: redis-server --requirepass redis123

  mongodb:
    image: mongo:8
    container_name: typing-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus-local.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - '7070:3000'


volumes:
  postgres-data:
  mongodb_data: